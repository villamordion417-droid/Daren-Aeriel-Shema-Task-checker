<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Dashboard</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #F5F5DC;
            color: #707070;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #FFFFFF;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.02);
        }
        .logout {
            text-align: right;
            margin-bottom: 20px;
        }
        .logout a {
            color: #707070;
            text-decoration: none;
        }
        .add-task {
            display: flex;
            margin-bottom: 20px;
        }
        .add-task input {
            flex: 1;
            padding: 10px;
            border: 1px solid #D1D1D1;
            border-radius: 5px 0 0 5px;
            border-right: none;
        }
        .add-task button {
            padding: 10px 15px;
            background-color: #707070;
            color: #FFFFFF;
            border: none;
            border-radius: 0 5px 5px 0;
            cursor: pointer;
        }
        .add-task button:hover {
            background-color: #D1D1D1;
        }
        .task {
            display: flex;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #F2EFEA;
            transition: opacity 0.3s;
        }
        .task:last-child {
            border-bottom: none;
        }
        .task.completed {
            opacity: 0;
        }
        .checkbox {
            width: 20px;
            height: 20px;
            margin-right: 10px;
            cursor: pointer;
        }
        .title {
            flex: 1;
        }
        .delete {
            color: #D1D1D1;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .task:hover .delete {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logout">
            <a href="{% url 'logout' %}">Logout</a>
        </div>
        <form class="add-task" method="post">
            {% csrf_token %}
            <input type="text" name="title" placeholder="Add a new task..." required>
            <button type="submit">+</button>
        </form>
        <div id="task-list">
            {% for task in tasks %}
            <div class="task" data-id="{{ task.id }}">
                <input type="checkbox" class="checkbox" onclick="completeTask({{ task.id }})">
                <span class="title">{{ task.title }}</span>
                <span class="delete" onclick="deleteTask({{ task.id }})">×</span>
            </div>
            {% endfor %}
        </div>
    </div>
    <script>
        function completeTask(taskId) {
            fetch(`/tasks/complete/${taskId}/`, {
                method: 'POST',
                headers: {
                    'X-CSRFToken': '{{ csrf_token }}',
                    'Content-Type': 'application/json',
                },
            }).then(response => {
                if (response.ok) {
                    const taskElement = document.querySelector(`.task[data-id="${taskId}"]`);
                    taskElement.classList.add('completed');
                    setTimeout(() => {
                        taskElement.remove();
                    }, 300);
                }
            });
        }

        function deleteTask(taskId) {
            fetch(`/tasks/delete/${taskId}/`, {
                method: 'POST',
                headers: {
                    'X-CSRFToken': '{{ csrf_token }}',
                    'Content-Type': 'application/json',
                },
            }).then(response => {
                if (response.ok) {
                    const taskElement = document.querySelector(`.task[data-id="${taskId}"]`);
                    taskElement.remove();
                }
            });
        }
    </script>
</body>
</html>
