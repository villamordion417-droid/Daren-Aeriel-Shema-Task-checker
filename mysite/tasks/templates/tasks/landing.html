<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Checker</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #F5F5DC;
            color: #707070;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            background-color: #FFFFFF;
            padding: 50px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.02);
        }
        h1 {
            font-size: 3em;
            margin-bottom: 20px;
        }
        p {
            font-size: 1.2em;
            margin-bottom: 30px;
        }
        .btn {
            background-color: #707070;
            color: #FFFFFF;
            padding: 15px 30px;
            border: none;
            border-radius: 50px;
            font-size: 1.1em;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        .btn:hover {
            background-color: #D1D1D1;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Clear your mind. One task at a time.</h1>
        <p>Start your journey to productivity.</p>
        <a href="{% url 'login' %}" class="btn">Get Started</a>
    </div>
</body>
</html>
